<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETMON | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --sidebar: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --sidebar-width: 260px;
            --sidebar-collapsed: 80px;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            transition: all 0.3s ease;
        }

        /* SIDEBAR COLLAPSIBLE */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        body.collapsed .sidebar { width: var(--sidebar-collapsed); padding: 20px 10px; }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            white-space: nowrap;
        }

        .logo { font-weight: 700; font-size: 1.25rem; color: var(--primary); display: flex; align-items: center; gap: 12px; }
        body.collapsed .logo span { display: none; }

        .toggle-btn { background: var(--primary-light); border: none; color: var(--primary); padding: 6px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; }

        /* Nav Menu */
        .nav-menu { flex: 1; }
        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: none;
            width: 100%;
            white-space: nowrap;
            font-family: inherit;
        }

        .nav-item:hover { background: #f1f5f9; color: var(--text-main); }
        .nav-item.active { background: var(--primary-light); color: var(--primary); }
        body.collapsed .nav-item span { display: none; }

        /* TOP BAR */
        .top-bar {
            height: 70px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .search-box { background: #f1f5f9; padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; width: 300px; }
        .search-box input { background: none; border: none; padding: 5px; outline: none; width: 100%; font-size: 0.9rem; }

        .user-profile { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 35px; height: 35px; background: var(--primary); color: #fff; border-radius: 50%; display: grid; place-items: center; font-weight: bold; }

        /* MAIN AREA */
        .main-wrapper { flex: 1; margin-left: var(--sidebar-width); transition: margin-left 0.3s ease; }
        body.collapsed .main-wrapper { margin-left: var(--sidebar-collapsed); }

        .content-area { padding: 30px; max-width: 1200px; }

        /* INPUT STYLES WITH EYE ICON */
        .action-bar {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            align-items: center;
        }

        .input-group { position: relative; flex: 1; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            background: #fcfcfc;
            font-family: inherit;
        }

        .input-group input:focus { border-color: var(--primary); background: #fff; }

        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            user-select: none;
            font-size: 1.1rem;
        }

        /* TABLE */
        .table-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--text-muted); border-bottom: 2px solid #f1f5f9; font-size: 0.85rem; }
        td { padding: 15px 12px; border-bottom: 1px solid #f1f5f9; }

        /* TV MONITOR */
        #section-monitor { background: #000; border-radius: 12px; overflow: hidden; border: 4px solid #1e293b; }
        iframe { width: 100%; height: 600px; border: none; }

        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="body-tag">

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                <span>NETMON</span>
            </div>
            <button class="toggle-btn" onclick="toggleSidebar()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>

        <nav class="nav-menu">
            <button class="nav-item active" id="btn-users" onclick="showSection('users')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2m8-10a4 4 0 100-8 4 4 0 000 8z"></path></svg>
                <span>Management</span>
            </button>
            <button class="nav-item" id="btn-monitor" onclick="showSection('monitor')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span>Live Monitor</span>
            </button>
        </nav>

        <button class="nav-item" style="color: var(--danger); margin-top: auto;" onclick="logout()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg>
            <span>Logout</span>
        </button>
    </div>

    <div class="main-wrapper">
        <div class="top-bar">
            <div class="search-box">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" placeholder="Search system...">
            </div>
            <div class="user-profile">
                <div style="text-align: right;">
                    <div id="u-name" style="font-weight: 700; font-size: 0.9rem;">Admin</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);">Root Access</div>
                </div>
                <div class="avatar" id="u-initial">A</div>
            </div>
        </div>

        <div class="content-area">
            <div id="section-users" class="fade-in">
                <h1 style="margin-bottom: 25px;">Account Management</h1>
                
                <div class="action-bar">
                    <div class="input-group">
                        <input type="text" id="new_user" placeholder="Username">
                    </div>
                    <div class="input-group">
                        <input type="password" id="new_pass" placeholder="Password">
                        <span class="eye-btn" onclick="toggleEye()">👁️</span>
                    </div>
                    <div class="input-group" style="flex: 0.5;">
                        <select id="new_role">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button onclick="addUser()" style="background: var(--primary); color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600;">+ Create</button>
                </div>

                <div class="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>USERNAME</th>
                                <th>ROLE</th>
                                <th style="text-align: right;">ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="user-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-monitor" style="display: none;" class="fade-in">
                <div style="background: #1e293b; padding: 10px 20px; color: #00d4ff; display: flex; justify-content: space-between; font-family: monospace;">
                    <span>● LIVE_STREAM_ACTIVE</span>
                    <span id="live-clock">00:00:00</span>
                </div>
                <iframe src="index.html" id="monitor-frame"></iframe>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() { document.getElementById('body-tag').classList.toggle('collapsed'); }

        // MATA PASSWORD LOGIC
        function toggleEye() {
            const p = document.getElementById('new_pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        const currentU = localStorage.getItem('netmon_user') || 'Admin';
        document.getElementById('u-name').innerText = currentU;
        document.getElementById('u-initial').innerText = currentU.charAt(0).toUpperCase();

        function showSection(section) {
            const isUser = section === 'users';
            document.getElementById('section-users').style.display = isUser ? 'block' : 'none';
            document.getElementById('section-monitor').style.display = isUser ? 'none' : 'block';
            document.getElementById('btn-users').classList.toggle('active', isUser);
            document.getElementById('btn-monitor').classList.toggle('active', !isUser);
            if(isUser) loadUsers();
        }

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        async function loadUsers() {
            const res = await fetch('/api/admin-action?action=list');
            const users = await res.json();
            const container = document.getElementById('user-list');
            container.innerHTML = users.map(u => `
                <tr>
                    <td style="font-weight: 600;">${u.username}</td>
                    <td><span style="padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight:700; background: ${u.role==='admin'?'#fee2e2':'#dcfce7'}; color: ${u.role==='admin'?'#b91c1c':'#15803d'}; text-transform:uppercase;">${u.role||'user'}</span></td>
                    <td style="text-align: right;"><button onclick="deleteUser('${u.username}')" style="color:var(--danger); border:none; background:none; cursor:pointer; font-weight:600;">Delete</button></td>
                </tr>
            `).join('');
        }

        async function addUser() {
            const username = document.getElementById('new_user').value;
            const password = document.getElementById('new_pass').value;
            const role = document.getElementById('new_role').value;
            if(!username || !password) return alert("Isi dulu!");

            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: 'signup', username, password, role })
            });
            const data = await res.json();
            if(data.success) { 
                loadUsers(); 
                document.getElementById('new_user').value = '';
                document.getElementById('new_pass').value = '';
                alert("Account Created!"); 
            }
        }

        async function deleteUser(u) {
            if(u === localStorage.getItem('netmon_user')) return alert("Jangan hapus diri sendiri!");
            if(confirm('Delete user '+u+'?')) {
                await fetch('/api/admin-action', { method: 'POST', body: JSON.stringify({ action: 'delete', username: u }) });
                loadUsers();
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        loadUsers();
    </script>
</body>
</html>
