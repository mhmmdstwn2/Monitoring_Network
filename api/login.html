<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NETMON - Security Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00d4ff; --bg: #0a0c10; --border: #1e2738; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: grid; place-items: center; min-height: 100vh; margin: 0; }
        .auth-container { background: #0f1218; border: 1px solid var(--border); padding: 40px; border-radius: 8px; width: 320px; box-shadow: 0 0 20px rgba(0,212,255,0.05); }
        h2 { font-family: 'Share Tech Mono', monospace; text-align: center; color: var(--accent); letter-spacing: 2px; }
        input { background: #151a22; border: 1px solid var(--border); color: #fff; padding: 12px; width: 100%; margin-bottom: 15px; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 13px; color: #4a5a6e; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 id="title">SYSTEM LOGIN</h2>
        <input type="email" id="email" placeholder="Email...">
        <input type="password" id="password" placeholder="Password...">
        <button onclick="handleAuth()" id="btn">AUTHORIZE</button>
        <div class="toggle-link" onclick="toggle()">Switch to <b id="toggle-text">Sign Up</b></div>
    </div>

    <script>
        let isLogin = true;
        function toggle() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "SYSTEM LOGIN" : "CREATE ACCOUNT";
            document.getElementById('toggle-text').innerText = isLogin ? "Sign Up" : "Login";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: isLogin ? 'login' : 'signup', email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('netmon_token', data.token);
                window.location.href = 'index.html';
            } else {
                alert("FAILED: " + data.message);
            }
        }
    </script>
</body>
</html>
